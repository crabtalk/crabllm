# Cloud model metadata — pricing (USD per million tokens) and context windows.
#
# These entries are loaded at startup and merged with the built-in
# defaults. Entries here override built-in values for the same model.
# The [models] section in crabllm.toml overrides both.
#
# Model names with dots must be quoted: ["gpt-4.1"]

