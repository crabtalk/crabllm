networks:
  bench:
    driver: bridge

services:
  mock:
    image: crabllm-bench:local
    build:
      context: .
      target: runner
    networks: [bench]
    command: crabllm-bench --port 9999
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9999/v1/models"]
      interval: 1s
      retries: 10

  crabllm:
    image: crabllm-bench:local
    networks: [bench]
    command: crabllm serve --config /app/config/bench-docker.toml
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 1s
      retries: 10
    depends_on:
      mock:
        condition: service_healthy

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    networks: [bench]
    command: --config /app/config.yaml --port 4000
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    environment:
      LITELLM_LOG: "ERROR"
      LITELLM_TELEMETRY: "False"
    depends_on:
      mock:
        condition: service_healthy

  runner:
    image: crabllm-bench:local
    networks: [bench]
    command: ./compare.sh ${BENCH_ARGS:-}
    volumes:
      - ./results:/results
    depends_on:
      mock:
        condition: service_healthy
      crabllm:
        condition: service_healthy
      litellm:
        condition: service_started
